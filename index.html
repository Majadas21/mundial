<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root {
  --navy: #0f172a;
  --navy2: #1e293b;
  --red: #e11d48;
  --red2: #be123c;
  --gold: #f59e0b;
  --silver: #94a3b8;
  --bronze: #b45309;
  --bg: #f1f5f9;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --success: #16a34a;
  --info-bg: #eff6ff;
  --info: #1d4ed8;
  --warn-bg: #fffbeb;
  --warn: #92400e;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Header ── */
header {
  background: var(--navy);
  color: white;
  padding: 0 1.5rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
.player-pill {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 30px;
  padding: 0.35rem 0.9rem;
  font-size: 0.82rem;
  cursor: pointer;
  transition: background 0.15s;
}
.player-pill:hover { background: rgba(255,255,255,0.18); }
.player-avatar-sm {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 700; color: white; flex-shrink: 0;
}

/* ── Nav tabs ── */
.nav {
  background: var(--navy2);
  display: flex;
  padding: 0 1rem;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex-shrink: 0;
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  padding: 0.75rem 1rem;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
}
.nav-btn.active { color: white; border-bottom-color: var(--red); }
.nav-btn:hover:not(.active) { color: rgba(255,255,255,0.8); }

/* ── Day selector (scroll horizontal) ── */
.day-scroll-wrap {
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;   /* momentum scroll en iOS */
  overscroll-behavior-x: contain;      /* no arrastra la página al llegar al borde */
  scroll-snap-type: x proximity;       /* engancha suavemente a cada fecha */
  padding: 1rem 1rem 0;
}
.day-scroll-wrap::-webkit-scrollbar { display: none; }
.day-scroll {
  display: flex;
  gap: 8px;
  width: max-content;
}
.day-chip {
  display: flex; flex-direction: column; align-items: center;
  flex: 0 0 auto;                       /* nunca se encoge: siempre se desplaza */
  scroll-snap-align: center;
  padding: 0.55rem 1rem;
  border-radius: 30px;
  border: 1.5px solid var(--border);
  background: var(--card);
  cursor: pointer;
  transition: all 0.15s;
  min-width: 64px;
}
.day-chip .day-name { font-size: 0.65rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.day-chip .day-num { font-size: 1.1rem; font-weight: 700; }
.day-chip.active { background: var(--red); border-color: var(--red); color: white; }
.day-chip.active .day-name { color: rgba(255,255,255,0.75); }
.day-chip.today-chip { border-color: var(--red); }
.day-chip.today-chip .day-num { color: var(--red); }

/* ── Container ── */
.container { max-width: 680px; margin: 0 auto; padding: 1rem; }

/* ── Match card ── */
.match-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 1rem;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.match-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
.match-header {
  background: var(--navy);
  color: rgba(255,255,255,0.7);
  padding: 0.45rem 1rem;
  font-size: 0.72rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.match-header .stage { color: white; font-weight: 600; }
.match-body { padding: 1.25rem 1rem 1rem; }
.match-teams {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 1.1rem;
}
.team { text-align: center; }
.team-flag { line-height: 1; margin-bottom: 0.4rem; min-height: 40px; display: flex; align-items: center; justify-content: center; }
.flag-img { height: 40px; width: 60px; object-fit: cover; border-radius: 5px; box-shadow: 0 1px 4px rgba(0,0,0,0.18); display: block; }
.flag-fallback { font-size: 2.4rem; line-height: 1; }
.team-name { font-size: 0.78rem; font-weight: 600; color: var(--text); }
.vs-block { text-align: center; }
.vs { font-size: 0.75rem; color: var(--muted); font-weight: 600; letter-spacing: 1px; }
.live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: pulse 1s infinite; margin-right: 4px; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ── Score inputs ── */
.score-inputs { display: flex; align-items: center; justify-content: center; gap: 1.25rem; margin-bottom: 0.85rem; }
.score-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.score-group label { font-size: 0.68rem; color: var(--muted); font-weight: 500; }
.score-input {
  width: 58px; height: 58px;
  text-align: center; font-size: 1.6rem; font-weight: 700;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: var(--bg);
  color: var(--navy);
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  -moz-appearance: textfield;
}
.score-input::-webkit-inner-spin-button,
.score-input::-webkit-outer-spin-button { display: none; }
.score-input:focus { border-color: var(--red); background: white; }
.score-dash { font-size: 1.8rem; color: var(--border); font-weight: 300; padding-top: 14px; }

.submit-btn {
  width: 100%; padding: 0.75rem;
  background: var(--red); color: white;
  border: none; border-radius: 10px;
  font-size: 0.95rem; font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, background 0.15s;
}
.submit-btn:hover { background: var(--red2); }
.submit-btn:active { transform: scale(0.98); }

/* ── Vote status ── */
.vote-done {
  text-align: center; padding: 0.65rem;
  background: #f0fdf4; border-radius: 10px;
  font-size: 0.85rem; color: var(--success); font-weight: 600;
  margin-bottom: 0.5rem;
}
.vote-locked {
  text-align: center; padding: 0.65rem;
  background: var(--warn-bg); border-radius: 10px;
  font-size: 0.82rem; color: var(--warn);
  margin-top: 0.5rem;
}
.result-box {
  text-align: center; padding: 0.65rem;
  background: var(--info-bg); border-radius: 10px;
  font-size: 0.85rem; color: var(--info);
  margin-top: 0.5rem;
}
.pts-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-weight: 700; font-size: 0.8rem;
  margin-left: 6px;
}
.pts-100 { background: #fef9c3; color: #713f12; }
.pts-75 { background: #dcfce7; color: #14532d; }
.pts-50 { background: #dbeafe; color: #1e3a8a; }
.pts-0  { background: #fee2e2; color: #7f1d1d; }

/* ── Friend votes ── */
.friend-votes { margin-top: 0.85rem; border-top: 1px solid var(--border); padding-top: 0.75rem; }
.friend-votes-title { font-size: 0.7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.friend-vote-row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid #f8fafc;
}
.friend-vote-row:last-child { border-bottom: none; }
.fv-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 700; color: white; flex-shrink: 0;
}
.fv-name { flex: 1; font-size: 0.82rem; font-weight: 500; }
.fv-score { font-size: 0.82rem; font-weight: 700; color: var(--navy); }

/* ── Ranking ── */
.ranking-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 1rem;
}
.ranking-row {
  display: flex; align-items: center; gap: 12px;
  padding: 0.9rem 1.1rem;
  border-bottom: 1px solid #f8fafc;
  transition: background 0.1s;
}
.ranking-row:last-child { border-bottom: none; }
.ranking-row:hover { background: #f8fafc; }
.rank-pos {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 700; flex-shrink: 0;
}
.pos-1 { background: #fef9c3; color: #854d0e; font-size: 1.1rem; }
.pos-2 { background: #f1f5f9; color: #475569; font-size: 1.1rem; }
.pos-3 { background: #fff7ed; color: #9a3412; font-size: 1.1rem; }
.pos-other { background: var(--bg); color: var(--muted); font-size: 0.8rem; }
.rank-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; font-weight: 700; color: white; flex-shrink: 0;
}
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-weight: 600; font-size: 0.92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
.rank-pts { font-weight: 800; font-size: 1.15rem; color: var(--navy); white-space: nowrap; }
.you-tag { font-size: 0.65rem; color: var(--red); font-weight: 700; margin-left: 5px; background: #fff1f2; padding: 1px 6px; border-radius: 10px; }

/* ── Chart ── */
.chart-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 1.1rem;
  margin-bottom: 1rem;
}
.chart-title { font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
.chart-box { position: relative; height: 220px; }

/* ── Grupos ── */
.group-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
.group-title { background: var(--navy); color: #fff; font-weight: 700; font-size: 0.85rem; padding: 0.6rem 1rem; }
.group-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.group-table th { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); font-weight: 600; padding: 0.5rem 0.3rem; text-align: center; }
.group-table th.g-team-h { text-align: left; padding-left: 1rem; }
.group-table td { padding: 0.5rem 0.3rem; text-align: center; border-top: 1px solid #f1f5f9; }
.group-table .g-pos { width: 26px; color: var(--muted); font-weight: 700; }
.group-table .g-team { text-align: left; padding-left: 0.5rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 0; width: 99%; }
.group-table .g-team .flag-img { height: 18px; border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 7px; box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
.group-table .g-pts { font-weight: 800; color: var(--navy); }
.group-table tr.qualifies td { background: #f0fdf4; }
.group-table tr.qualifies .g-pos { color: var(--success); }
.group-legend { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); margin: 0 0.25rem 1rem; }
.group-legend .dot { width: 10px; height: 10px; border-radius: 3px; background: #bbf7d0; flex-shrink: 0; }

/* ── Eliminatorias ── */
.bracket-wrap { overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; padding: 1rem 0.5rem 1.5rem; }
.bracket-inner { display: flex; gap: 0; align-items: flex-start; min-width: max-content; }
.bracket-round { display: flex; flex-direction: column; align-items: stretch; min-width: 170px; max-width: 200px; }
.bracket-round-title { text-align: center; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); padding: 0 0.5rem 0.6rem; white-space: nowrap; }
.bracket-slots { display: flex; flex-direction: column; }
.bracket-slot-pair { display: flex; flex-direction: column; justify-content: center; }
.bracket-match { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin: 3px 4px; flex-shrink: 0; }
.bracket-team { display: flex; align-items: center; gap: 6px; padding: 5px 8px; font-size: 0.78rem; font-weight: 500; border-bottom: 1px solid var(--border); }
.bracket-team:last-child { border-bottom: none; }
.bracket-team.winner { background: #f0fdf4; font-weight: 700; }
.bracket-team .flag-img { height: 16px; width: 24px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
.bracket-team-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bracket-team-score { font-weight: 700; font-size: 0.85rem; color: var(--navy); min-width: 14px; text-align: right; }
.bracket-connector { display: flex; flex-direction: column; width: 16px; flex-shrink: 0; }
.bracket-connector-line { flex: 1; border-right: 2px solid var(--border); }
.bracket-connector-line:first-child { border-bottom: 2px solid var(--border); }
.bracket-connector-line:last-child { border-top: 2px solid var(--border); }
.bracket-tbd { color: var(--muted); font-style: italic; }
.bracket-empty { display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.9rem; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 1rem;
  backdrop-filter: blur(3px);
}
.modal {
  background: white; border-radius: 20px;
  padding: 2rem; max-width: 360px; width: 100%; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal-icon { font-size: 3.5rem; margin-bottom: 0.5rem; }
.modal h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.4rem; }
.modal p { color: var(--muted); font-size: 0.88rem; margin-bottom: 1.5rem; line-height: 1.5; }
.name-input {
  width: 100%; padding: 0.8rem 1rem;
  border: 2px solid var(--border); border-radius: 12px;
  font-size: 1rem; outline: none; margin-bottom: 0.75rem;
  transition: border-color 0.15s;
}
.name-input:focus { border-color: var(--red); }
.name-btn {
  width: 100%; padding: 0.8rem;
  background: var(--navy); color: white;
  border: none; border-radius: 12px;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: background 0.15s;
}
.name-btn:hover { background: var(--navy2); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--navy); color: white;
  padding: 0.75rem 1.5rem; border-radius: 30px;
  font-size: 0.88rem; z-index: 999;
  opacity: 0; transition: opacity 0.25s, transform 0.25s;
  pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Confetti ── */
.confetti-wrap {
  position: fixed; inset: 0; pointer-events: none; z-index: 998; overflow: hidden;
}
.confetto {
  position: absolute; top: -10px;
  width: 8px; height: 8px; border-radius: 2px;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ── Empty / spinner ── */
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.empty-state .eicon { font-size: 3rem; margin-bottom: 0.75rem; }
.spinner { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }
.section-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin: 1.25rem 0 0.6rem; }
</style>
</head>
<body>

<!-- Name modal -->
<div id="nameModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-icon">⚽</div>
    <h2>Quiniela Mundial 2026</h2>
    <p>¿Cómo te llamas? Te recordaremos para la próxima vez que entres.</p>
    <input id="nameInput" class="name-input" type="text" placeholder="Tu nombre..." maxlength="20" />
    <button class="name-btn" onclick="saveName()">Entrar al grupo</button>
  </div>
</div>

<!-- Confetti container -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- Header -->
<header>
  <h1>⚽ Mundial 2026</h1>
  <div style="display:flex;align-items:center;gap:0.5rem">
    <button id="notifBtn" onclick="toggleNotifications()" title="Activar notificaciones"
      style="background:none;border:none;cursor:pointer;font-size:1.4rem;opacity:0.6;padding:0.2rem;line-height:1">🔔</button>
    <div class="player-pill" id="playerPill" onclick="changeName()">
      <div class="player-avatar-sm" id="headerAvatar"></div>
      <span id="headerName">...</span>
    </div>
  </div>
</header>

<!-- Nav -->
<nav class="nav">
  <button class="nav-btn active" onclick="showSection('matches')" id="nav-matches">Partidos</button>
  <button class="nav-btn" onclick="showSection('groups')" id="nav-groups">📊 Grupos</button>
  <button class="nav-btn" onclick="showSection('knockout')" id="nav-knockout">⚔️ Eliminatorias</button>
  <button class="nav-btn" onclick="showSection('ranking')" id="nav-ranking">🏆 Clasificación</button>
</nav>

<!-- Day selector -->
<div class="day-scroll-wrap" id="dayScrollWrap" style="display:none">
  <div class="day-scroll" id="dayScroll"></div>
</div>

<!-- Main content -->
<div class="container">
  <div id="section-matches"><div class="spinner">Cargando partidos...</div></div>
  <div id="section-groups" style="display:none"></div>
  <div id="section-knockout" style="display:none"></div>
  <div id="section-ranking" style="display:none"></div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9wtUHQXZwok7Y81YqodnVzT-5KWPFhyo",
  authDomain: "mundial-99cdc.firebaseapp.com",
  databaseURL: "https://mundial-99cdc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mundial-99cdc",
  storageBucket: "mundial-99cdc.firebasestorage.app",
  messagingSenderId: "356216751389",
  appId: "1:356216751389:web:8f153ce31ac45514d08df4"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── Paleta de colores por jugador ─────────────────────────────────────────
// Tonos bien separados en el círculo cromático (rojo→azul→ámbar→verde→…) para
// que dos jugadores consecutivos nunca se confundan. El texto del avatar se
// calcula según el color (claro u oscuro), así pueden usarse tonos vivos.
const PALETTE = [
  '#e11d48', // rojo
  '#3b82f6', // azul
  '#f59e0b', // ámbar
  '#16a34a', // verde
  '#a855f7', // morado
  '#ec4899', // rosa
  '#06b6d4', // cian
  '#f97316', // naranja
  '#84cc16', // lima
  '#6366f1', // índigo
  '#14b8a6', // teal
  '#eab308', // amarillo
  '#ef4444', // rojo claro
  '#8b5cf6', // violeta
  '#22c55e', // verde claro
  '#d946ef', // fucsia
];
const playerColors = {};
function getPlayerColor(name) {
  if (!(name in playerColors)) {
    const idx = Object.keys(playerColors).length;
    // Hasta 16 jugadores se usa la paleta; a partir de ahí, ángulo áureo
    // (137.5°) que reparte tonos nuevos siempre separados de los anteriores.
    playerColors[name] = idx < PALETTE.length
      ? PALETTE[idx]
      : `hsl(${Math.round((idx * 137.508) % 360)} 70% 45%)`;
  }
  return playerColors[name];
}
// Devuelve texto blanco u oscuro según la luminancia del fondo (legibilidad)
function textOn(bg) {
  if (bg[0] === '#') {
    const h = bg.slice(1);
    const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
    return (0.299*r + 0.587*g + 0.114*b) < 150 ? '#fff' : '#1e293b';
  }
  const m = bg.match(/hsl\(\s*[\d.]+[ ,]+[\d.]+%[ ,]+([\d.]+)%/);
  return (m ? parseFloat(m[1]) : 50) < 60 ? '#fff' : '#1e293b';
}

// ── Load matches per day ──────────────────────────────────────────────────
async function loadAllDays() {
  // Esperar matches.json antes de renderizar — sin demos mezclados
  let gotReal = false;
  try {
    const res = await fetch('./matches.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      const realDays = {};
      for (const [date, matches] of Object.entries(data)) {
        if (Array.isArray(matches) && matches.length) {
          realDays[date] = { date, matches };
        }
      }
      if (Object.keys(realDays).length) {
        allDays = realDays;
        gotReal = true;
      }
    }
  } catch {}

  // Solo usar demos si el fetch falla completamente
  if (!gotReal) allDays = { ...DEMO_DAYS };

  // Seleccionar hoy si existe; si no, el día más reciente disponible
  const sorted = Object.keys(allDays).sort();
  if (allDays[TODAY]) {
    selectedDate = TODAY;
  } else {
    const past = sorted.filter(d => d <= TODAY);
    selectedDate = past.length ? past[past.length - 1] : sorted[0];
  }

  renderDaySelector();
  renderAll();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function isStarted(match) {
  const now = new Date();
  if (match.datetime) {
    // Datetimes en matches.json son hora de Madrid (CEST = UTC+2)
    return now >= new Date(match.datetime + ':00+02:00');
  }
  // Fallback para partidos demo (solo tienen time)
  const [h,m] = match.time.split(':').map(Number);
  return now >= new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
}

function computePoints(vote, result) {
  if (!vote || !result) return null;
  let pts = 0;
  if (Math.sign(vote.home - vote.away) === Math.sign(result.home - result.away)) pts += 50;
  if (vote.home === result.home) pts += 25;
  if (vote.away === result.away) pts += 25;
  return pts;
}

function ptsBadge(pts) {
  if (pts === null) return '';
  const cls = pts===100?'pts-100':pts>=75?'pts-75':pts>=50?'pts-50':'pts-0';
  return `<span class="pts-badge ${cls}">${pts} pts</span>`;
}

function renderDaySelector() {
  const wrap = document.getElementById('dayScrollWrap');
  const scroll = document.getElementById('dayScroll');
  const days = Object.keys(allDays).sort();
  if (!days.length) { wrap.style.display='none'; return; }
  wrap.style.display = 'block';

  const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  scroll.innerHTML = days.map(d => {
    // Parsear manualmente "YYYY-MM-DD" para evitar NaN en Safari/Firefox
    const [y, mo, day] = d.split('-').map(Number);
    const dt = new Date(y, mo - 1, day, 12, 0, 0);
    const isToday = d === TODAY;
    const isActive = d === selectedDate;
    return `<div class="day-chip${isActive?' active':''}${isToday&&!isActive?' today-chip':''}" onclick="selectDay('${d}')">
      <span class="day-name">${DAYS_ES[dt.getDay()]}</span>
      <span class="day-num">${day}</span>
    </div>`;
  }).join('');

  // Centrar el día activo SOLO dentro de la tira (no mover la página entera,
  // que es lo que hacía scrollIntoView y sacaba el contenido de la pantalla).
  // Posicionamiento instantáneo (scrollLeft): 'smooth' se cancela al combinarse
  // con scroll-snap y el día activo no llegaba a centrarse.
  setTimeout(() => {
    const active = scroll.querySelector('.day-chip.active');
    if (active) {
      const target = active.offsetLeft - (wrap.clientWidth - active.offsetWidth) / 2;
      wrap.scrollLeft = Math.max(0, target);
    }
  }, 50);
}

window.selectDay = function(date) {
  selectedDate = date;
  renderDaySelector();
  renderMatches();
};

const KNOCKOUT_STAGES = [
  { key: 'Last 32',      label: 'Dieciseisavos' },
  { key: 'Last 16',      label: 'Octavos' },
  { key: 'Quarter Finals', label: 'Cuartos' },
  { key: 'Semi Finals',  label: 'Semifinales' },
  { key: 'Third Place',  label: '3er y 4º puesto' },
  { key: 'Final',        label: 'Final' },
];

function renderKnockout() {
  const el = document.getElementById('section-knockout');
  const allMatches = Object.values(allDays).flatMap(d => d.matches || []);

  // Agrupar por ronda, excluyendo fase de grupos
  const byStage = {};
  allMatches.forEach(m => {
    const g = m.group;
    if (!g || g.startsWith('Grupo ')) return;
    if (!byStage[g]) byStage[g] = [];
    byStage[g].push(m);
  });

  const stagesPresent = KNOCKOUT_STAGES.filter(s => byStage[s.key]);
  if (!stagesPresent.length) {
    el.innerHTML = '<div class="bracket-empty">⚔️ El cuadro eliminatorio aún no está disponible</div>';
    return;
  }

  // Calcular altura de slot para alineación visual (basada en 1ª ronda)
  const firstStageMatches = byStage[stagesPresent[0].key] || [];
  // Por cada ronda, ordenar por datetime/id
  stagesPresent.forEach(s => {
    byStage[s.key].sort((a, b) => (a.datetime || a.id) < (b.datetime || b.id) ? -1 : 1);
  });

  function teamRow(name, score, isWinner) {
    const flag = name ? getFlag(name) : '';
    const nameHtml = name
      ? `<span class="bracket-team-name">${name}</span>`
      : `<span class="bracket-team-name bracket-tbd">Por determinar</span>`;
    const scoreHtml = score != null ? `<span class="bracket-team-score">${score}</span>` : '';
    return `<div class="bracket-team${isWinner ? ' winner' : ''}">${flag}${nameHtml}${scoreHtml}</div>`;
  }

  function matchCard(m) {
    const result = m.result;
    const homeWin = result && result.home > result.away;
    const awayWin = result && result.away > result.home;
    return `<div class="bracket-match">
      ${teamRow(m.home, result ? result.home : null, homeWin)}
      ${teamRow(m.away, result ? result.away : null, awayWin)}
    </div>`;
  }

  const rounds = stagesPresent.map(s => {
    const matches = byStage[s.key];
    const slots = matches.map(m => `<div class="bracket-slot-pair">${matchCard(m)}</div>`).join('');
    return `<div class="bracket-round">
      <div class="bracket-round-title">${s.label}</div>
      <div class="bracket-slots">${slots}</div>
    </div>`;
  });

  el.innerHTML = `<div class="bracket-wrap"><div class="bracket-inner">${rounds.join('')}</div></div>`;
}

function renderGroups() {
  const el = document.getElementById('section-groups');
  const allMatches = Object.values(allDays).flatMap(d => d.matches || []);

  // Acumular estadísticas por grupo y equipo.
  // SOLO fase de grupos: los partidos eliminatorios (octavos, cuartos…) llegan
  // con otro 'group' (LAST_16, etc.) y no deben sumar a la clasificación.
  const groups = {};
  allMatches.forEach(m => {
    const g = m.group;
    if (!g || !g.startsWith('Grupo ')) return;
    if (!groups[g]) groups[g] = {};
    const home = normTeam(m.home), away = normTeam(m.away);
    [home, away].forEach(t => {
      if (!groups[g][t]) groups[g][t] = { team: t, pj:0, g:0, e:0, p:0, gf:0, gc:0, pts:0 };
    });
    if (m.result) {
      const h = groups[g][home], a = groups[g][away];
      const hs = m.result.home, as = m.result.away;
      h.pj++; a.pj++;
      h.gf += hs; h.gc += as; a.gf += as; a.gc += hs;
      if (hs > as)      { h.g++; h.pts += 3; a.p++; }
      else if (hs < as) { a.g++; a.pts += 3; h.p++; }
      else              { h.e++; a.e++; h.pts++; a.pts++; }
    }
  });

  const groupNames = Object.keys(groups).sort();
  if (!groupNames.length) {
    el.innerHTML = '<div class="empty-state"><div class="eicon">📊</div><p>Aún no hay grupos.</p></div>';
    return;
  }

  const cards = groupNames.map(gname => {
    const standings = Object.values(groups[gname]).sort((x,y) =>
      y.pts - x.pts ||
      (y.gf - y.gc) - (x.gf - x.gc) ||
      y.gf - x.gf ||
      x.team.localeCompare(y.team)
    );
    const rows = standings.map((s, i) => {
      const dg = s.gf - s.gc;
      return `<tr class="${i < 2 ? 'qualifies' : ''}">
        <td class="g-pos">${i + 1}</td>
        <td class="g-team">${getFlag(s.team)}${s.team}</td>
        <td>${s.pj}</td>
        <td>${dg > 0 ? '+' : ''}${dg}</td>
        <td class="g-pts">${s.pts}</td>
      </tr>`;
    }).join('');
    return `<div class="group-card">
      <div class="group-title">${gname}</div>
      <table class="group-table">
        <thead><tr><th></th><th class="g-team-h">Equipo</th><th>PJ</th><th>DG</th><th>Pts</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="group-legend"><span class="dot"></span>Los 2 primeros se clasifican directamente (más los mejores terceros)</div>${cards}`;
}

function renderMatches() {
  const el = document.getElementById('section-matches');
  const dayData = allDays[selectedDate];
  const matches = dayData?.matches || [];

  if (!matches.length) {
    el.innerHTML = '<div class="empty-state"><div class="eicon">📅</div><p>No hay partidos este día.</p></div>';
    return;
  }

  el.innerHTML = matches.map(match => {
    const started = isStarted(match);
    const votes = allVotes[match.id] || {};
    const myVoteEntry = Object.values(votes).find(v => v.name === currentPlayer);
    const result = match.result;

    // Input section
    let inputSection = '';
    if (myVoteEntry) {
      inputSection = `<div class="vote-done">✅ Tu pronóstico: ${myVoteEntry.home} – ${myVoteEntry.away}</div>`;
      if (result) {
        const pts = computePoints(myVoteEntry, result);
        inputSection += `<div class="result-box">Resultado final: <strong>${result.home} – ${result.away}</strong>${ptsBadge(pts)}</div>`;
      } else if (started) {
        inputSection += `<div class="vote-locked"><span class="live-dot"></span>Partido en juego — resultado pendiente</div>`;
      }
    } else if (!started) {
      inputSection = `
        <div class="score-inputs">
          <div class="score-group">
            <label>${match.home}</label>
            <input class="score-input" type="number" min="0" max="20" id="h_${match.id}" placeholder="0">
          </div>
          <div class="score-dash">–</div>
          <div class="score-group">
            <label>${match.away}</label>
            <input class="score-input" type="number" min="0" max="20" id="a_${match.id}" placeholder="0">
          </div>
        </div>
        <button class="submit-btn" onclick="submitVote('${match.id}')">Guardar pronóstico</button>`;
    } else {
      // Empezado pero sin voto
      if (result) {
        inputSection = `<div class="vote-locked">🔒 No votaste este partido</div>
        <div class="result-box">Resultado final: <strong>${result.home} – ${result.away}</strong>${ptsBadge(0)}</div>`;
      } else {
        inputSection = `<div class="vote-locked">🔒 Partido comenzado — ya no se puede votar</div>`;
      }
    }

    // Friend votes (solo visibles si el partido empezó)
    let friendVotes = '';
    if (started) {
      const others = Object.values(votes).filter(v => v.name !== currentPlayer);
      if (others.length) {
        friendVotes = `<div class="friend-votes">
          <div class="friend-votes-title">Pronósticos</div>` +
          others.map(v => {
            const pts = result ? computePoints(v, result) : null;
            return `<div class="friend-vote-row">
              ${avatar(v.name, 26)}
              <span class="fv-name">${v.name}</span>
              <span class="fv-score">${v.home} – ${v.away}${pts !== null ? ' · ' + ptsBadge(pts) : ''}</span>
            </div>`;
          }).join('') + `</div>`;
      }
    }

    const liveIndicator = started && !result
      ? `<span style="font-size:0.7rem;color:#ef4444"><span class="live-dot"></span>En juego</span>`
      : result ? `<span style="font-size:0.7rem;color:#16a34a;font-weight:600">FIN ${result.home}–${result.away}</span>` : '';

    return `<div class="match-card">
      <div class="match-header">
        <span class="stage">${match.group || ''}</span>
        <span style="display:flex;align-items:center;gap:8px">${liveIndicator}<span>⏰ ${match.time}</span></span>
      </div>
      <div class="match-body">
        <div class="match-teams">
          <div class="team"><div class="team-flag">${getFlag(match.home)}</div><div class="team-name">${match.home}</div></div>
          <div class="vs-block"><div class="vs">VS</div></div>
          <div class="team"><div class="team-flag">${getFlag(match.away)}</div><div class="team-name">${match.away}</div></div>
        </div>
        ${inputSection}
        ${friendVotes}
      </div>
    </div>`;
  }).join('');
}

window.submitVote = async function(matchId) {
  const h = parseInt(document.getElementById('h_' + matchId).value);
  const a = parseInt(document.getElementById('a_' + matchId).value);
  if (isNaN(h)||isNaN(a)||h<0||a<0) { showToast('Introduce un resultado válido'); return; }

  const playerKey = safeKey(currentPlayer);
  const voteRef = ref(db, `votes/${matchId}/${playerKey}`);

  try {
    await set(voteRef, { home: h, away: a, ts: Date.now(), name: currentPlayer });
    showToast('¡Pronóstico guardado! 🎯');
    animateSave();
  } catch(e) {
    const msg = e?.message || '';
    if (msg.includes('PERMISSION_DENIED')) {
      showToast('Ya has votado este partido');
    } else {
      console.error('Error al guardar pronóstico:', e);
      showToast('Error al guardar. Comprueba tu conexión.', true);
    }
  }
};

      const result = match.result;
      Object.values(votes).forEach(vote => {
        const name = vote.name || '?';
        if (!players[name]) players[name] = { pts:0, exact:0, correct:0, total:0 };
        if (!playersByDay[name]) playersByDay[name] = Array(sortedDays.length).fill(0);
        players[name].total++;
        if (result) {
          const pts = computePoints(vote, result);
          players[name].pts += pts;
          if (pts===100) players[name].exact++;
          if (pts>=50) players[name].correct++;
          // Acumular para gráfico
          for (let i = dayIdx; i < sortedDays.length; i++) {
            playersByDay[name][i] += pts;
          }
        }
      });
    });
  });

  const sorted = Object.entries(players).sort((a,b) => b[1].pts - a[1].pts);

  if (!sorted.length) {
    el.innerHTML = '<div class="empty-state"><div class="eicon">🏆</div><p>Aún no hay votos. ¡Sé el primero!</p></div>';
    return;
  }

  const posEmoji = i => ['🥇','🥈','🥉'][i] || (i+1);
  const posClass = i => ['pos-1','pos-2','pos-3'][i] || 'pos-other';

  const rankingHtml = `<div class="ranking-card">` +
    sorted.map(([name, s], i) => `
    <div class="ranking-row">
      <div class="rank-pos ${posClass(i)}">${posEmoji(i)}</div>
      ${avatar(name, 36)}
      <div class="rank-info">
        <div class="rank-name">${name}${name===currentPlayer?'<span class="you-tag">tú</span>':''}</div>
        <div class="rank-sub">${s.exact} exactos · ${s.correct}/${s.total} ganadores</div>
      </div>
      <div class="rank-pts">${s.pts} pts</div>
    </div>`).join('') + `</div>
    <p style="text-align:center;font-size:0.7rem;color:var(--muted);margin-top:0.5rem;margin-bottom:1rem">
      50 pts ganador · +25 goles local · +25 goles visitante
    </p>`;

  // Gráfico de evolución — altura fija para que se adapte bien en móvil
  const chartHtml = `<div class="chart-card">
    <div class="chart-title">Evolución del ranking</div>
    <div class="chart-box"><canvas id="rankChart"></canvas></div>
  </div>`;

  el.innerHTML = chartHtml + rankingHtml;

  // Renderizar gráfico
  const ctx = document.getElementById('rankChart').getContext('2d');
  if (rankChart) rankChart.destroy();

  const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const labels = sortedDays.map(d => {
    const [y, mo, day] = d.split('-').map(Number);
    const dt = new Date(y, mo - 1, day, 12, 0, 0);
    return DAYS_ES[dt.getDay()] + ' ' + day;
  });

  // Con muchas jornadas reducimos/ocultamos los puntos para no saturar
  const nDays = sortedDays.length;
  const ptRadius = nDays > 18 ? 0 : nDays > 10 ? 2 : 4;

  rankChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: Object.entries(playersByDay).map(([name, data]) => {
        const c = getPlayerColor(name);
        return {
          label: name,
          data,
          borderColor: c,
          backgroundColor: c,
          borderWidth: 2.5,
          pointRadius: ptRadius,
          pointHoverRadius: ptRadius + 2,
          pointBackgroundColor: c,
          tension: 0.35,
          fill: false,
        };
      })
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, padding: 10, font: { size: 11 } } },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 }, precision: 0 } },
        x: {
          grid: { display: false },
          // En móvil, con muchos días, mostrar como máximo ~7 etiquetas sin rotar
          ticks: { font: { size: 11 }, autoSkip: true, maxTicksLimit: 7, maxRotation: 0, minRotation: 0 }
        }
      }
    }
  });
}

// ── Navigation ────────────────────────────────────────────────────────────
window.showSection = function(section) {
  ['matches','groups','knockout','ranking'].forEach(s => {
    document.getElementById('section-' + s).style.display = s===section ? 'block' : 'none';
    document.getElementById('nav-' + s).className = 'nav-btn' + (s===section ? ' active' : '');
  });
  document.getElementById('dayScrollWrap').style.display = section==='matches' ? 'block' : 'none';
  if (section === 'ranking') renderRanking();
};

// ── Animaciones ───────────────────────────────────────────────────────────
function animateSave() {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#e11d48','#f59e0b','#16a34a','#0284c7','#7c3aed','#fff'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetto';
    c.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${0.8 + Math.random()*0.8}s;
      animation-delay:${Math.random()*0.3}s;
      transform:rotate(${Math.random()*360}deg);
      width:${6+Math.random()*6}px;
      height:${6+Math.random()*6}px;
    `;
    wrap.appendChild(c);
    setTimeout(() => c.remove(), 1500);
  }
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#dc2626' : '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();

// VAPID key: Firebase Console → Project Settings → Cloud Messaging
//            → Web Push certificates → Generate key pair
const VAPID_KEY = 'BFhlr3ufvNCE8weQjcdeJR_OjLMA-9figaX5tcKGZ19EaC3Sp11TDMSvgORAD9U8x16e8JBh9NLrSbft2f99P9o';

function getMessagingInstance() {
  try { return getMessaging(app); } catch { return null; }
}

window.toggleNotifications = async function toggleNotifications() {
  const btn = document.getElementById('notifBtn');
  if (Notification.permission === 'granted') {
    showToast('Las notificaciones ya están activadas ✅');
    btn.style.opacity = '1';
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') {
    showToast('Notificaciones denegadas', true);
    return;
  }
  await registerPushToken();
}

async function registerPushToken() {
  try {
    const messaging = getMessagingInstance();
    if (!messaging) { showToast('Notificaciones no disponibles en este navegador', true); return; }
    const swReg = await navigator.serviceWorker.register('./sw.js');
    const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
    if (!token) return;
    const safeToken = token.replace(/[.#$/[\]]/g, '_');
    await set(ref(db, `fcm_tokens/${safeToken}`), { ts: Date.now(), token });
    document.getElementById('notifBtn').style.opacity = '1';
    showToast('¡Notificaciones activadas! 🔔');
  } catch (e) {
    console.error('Error registrando notificaciones:', e);
    showToast('Error al activar notificaciones', true);
  }
}

// Al cargar, si ya tenemos permiso, re-registramos el token silenciosamente
if ('Notification' in window && Notification.permission === 'granted') {
  registerPushToken().catch(() => {});
  document.getElementById('notifBtn').style.opacity = '1';
}
