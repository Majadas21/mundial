name: Actualizar partidos del día

on:
  schedule:
    # Se ejecuta cada día a las 09:00 hora española (07:00 UTC en verano CEST)
    # Los partidos en EEUU/México terminan de madrugada en España, así que a las 9am ya están todos finalizados
    - cron: '0 4 * * *'
  # También se puede lanzar manualmente desde la pestaña Actions de GitHub.
  # Para una carga inicial (backfill) rellena date_from / date_to:
  #   date_from = 2026-06-11  → carga todos los partidos desde esa fecha
  workflow_dispatch:
    inputs:
      date_from:
        description: "Backfill desde (YYYY-MM-DD). Vacío = solo el día actual."
        required: false
        default: ""
      date_to:
        description: "Backfill hasta (YYYY-MM-DD). Vacío = hoy."
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para hacer push del matches.json

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Generar matches.json con la API
        env:
          FOOTBALL_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
          DATE_FROM: ${{ github.event.inputs.date_from }}
          DATE_TO: ${{ github.event.inputs.date_to }}
        run: |
          python3 scripts/fetch_matches.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.json
          git diff --cached --quiet || git commit -m "⚽ Partidos actualizados $(date +'%Y-%m-%d')"
          git push
